name: Fiyat Snapshot

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: price-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repo'yu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fiyatlari cek
        run: python scripts/scrape.py

      - name: Degisiklik varsa commit et
        run: |
          git config user.name "piyasa-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/prices.json
          if git diff --staged --quiet; then
            echo "Degisiklik yok."
          else
            git commit -m "fiyat snapshot"
            git push
          fi
